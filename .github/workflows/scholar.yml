name: Fetch Scholar publications

on:
  # Every Monday at 06:15 UTC.
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:
    inputs:
      scholar_id:
        description: "Override Scholar ID (optional)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Token with write access so the workflow can commit back.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Scholar fetcher
        env:
          SCHOLAR_ID: ${{ inputs.scholar_id || 'D7Ms9fIAAAAJ' }}
        run: python scripts/fetch_scholar.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/publications.yml)" ]; then
            git add data/publications.yml
            git commit -m "chore(pubs): weekly Scholar sync"
            git push
          else
            echo "No publication changes."
          fi
